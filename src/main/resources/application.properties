spring.application.name=helmseek-backend
spring.threads.virtual.enabled=true

# Server
server.port=${PORT:7666}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# App
app.allowed-origin=${ALLOWED_ORIGIN:http://localhost:4200}
app.rate-limit-per-minute=${RATE_LIMIT_PER_MINUTE:100}
app.rate-limit-burst=${RATE_LIMIT_BURST:10}
app.rate-limit-auth-per-minute=${RATE_LIMIT_AUTH_PER_MINUTE:2}
app.prod=${PROD:false}

# Security configured via SecurityConfig.kt
